apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskapp-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/ts-a-devops/capstone-phoenix.git'
    targetRevision: HEAD
    path: manifests
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: taskapp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true
